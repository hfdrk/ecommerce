# PrestaShop 8.1 + MariaDB
# Run: docker compose up -d
# Storefront: http://localhost:8081
#
# DATABASE STEP (installer): use host "mariadb" — NOT localhost / 127.0.0.1
# (Inside the web container, "localhost" is wrong; see DB_INSTALL.txt)

services:
  mariadb:
    image: mariadb:10.11
    container_name: arden_ps_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-prestashop_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-prestashop}
      MYSQL_USER: ${MYSQL_USER:-prestashop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-prestashop}
    volumes:
      - ps_mariadb_data:/var/lib/mysql
    ports:
      # Optional: connect from Windows tools (DBeaver, mysql.exe) at 127.0.0.1:3307
      - "${MARIADB_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      ps_net:
        aliases:
          - mariadb
          - database
          - mysql

  prestashop:
    build: .
    image: arden-prestashop:8.1-installer-fix
    container_name: arden_ps_shop
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${PRESTASHOP_PORT:-8081}:80"
    environment:
      PS_DEV_MODE: ${PS_DEV_MODE:-0}
      PS_INSTALL_AUTO: ${PS_INSTALL_AUTO:-0}
      PS_DOMAIN: ${PS_DOMAIN:-localhost:8081}
      PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN:-admin-arden}
      DB_SERVER: mariadb
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-prestashop}
      DB_USER: ${MYSQL_USER:-prestashop}
      DB_PASSWD: ${MYSQL_PASSWORD:-prestashop}
      ADMIN_MAIL: ${ADMIN_MAIL:-admin@local.test}
      ADMIN_PASSWD: ${ADMIN_PASSWD:-ChangeMePresta123!}
    volumes:
      - ps_www:/var/www/html
    networks:
      - ps_net

networks:
  ps_net:
    name: arden_prestashop_net

volumes:
  ps_mariadb_data:
  ps_www:
